<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Futuristic AI Agent</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="background"></div>

    <div class="ai-container">
      <div class="ai-avatar"></div>

      <h1 class="title">Futuristic AI Agent</h1>
      <p class="subtitle">Your Personal Smart Assistant</p>

      <div class="input-box">
        <input type="text" placeholder="Ask anything..." />
        <button>Send</button>
      </div>

      <div class="response-box">
        <p>AI responses will appear here...</p>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
